name: Deploy API to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'src/Spendly.Api/**'
      - 'src/Spendly.Application/**'
      - 'src/Spendly.Domain/**'
      - 'src/Spendly.Infrastructure/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Spendly.Api/Spendly.Api.csproj

      - name: Build
        run: dotnet build src/Spendly.Api/Spendly.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/Spendly.Api/Spendly.Api.csproj --configuration Release --no-build --output ./publish/api

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'spendly-api'
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./publish/api

      - name: Post-deploy warmup ping
        run: |
          echo "Waiting 15 seconds for Azure to start the app..."
          Start-Sleep -Seconds 15
          $maxAttempts = 5
          $attempt = 0
          $success = $false
          while ($attempt -lt $maxAttempts -and -not $success) {
            $attempt++
            try {
              Write-Host "Warmup ping attempt $attempt/$maxAttempts..."
              $response = Invoke-WebRequest -Uri "https://spendly-api-dsfseqatcnh0etb8.westus2-01.azurewebsites.net/api/ping" -TimeoutSec 60 -UseBasicParsing
              Write-Host "Warmup ping succeeded with status $($response.StatusCode)"
              $success = $true
            } catch {
              Write-Host "Warmup ping attempt $attempt failed: $_"
              if ($attempt -lt $maxAttempts) { Start-Sleep -Seconds 10 }
            }
          }
          if (-not $success) { Write-Host "WARNING: Warmup ping failed after $maxAttempts attempts" }
